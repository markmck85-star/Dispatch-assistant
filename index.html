        async function _processDispatchCore() {
            const codesInput = document.getElementById('locationCodes');
            const resultsDiv = document.getElementById('results');

            let items = parseInputs(codesInput.value);
            let relevant = items.filter(i => LOCATIONS[i.code]);
            const unknownCodes = [...new Set(items.filter(i => !LOCATIONS[i.code]).map(i => i.code))];

            // Set unknown codes banner for print report
            window.unknownCodesBannerHtml = unknownCodes.length > 0
                ? `<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:6px 10px;margin-bottom:8px;font-size:12px;"><strong>⚠️ Unrecognized Locations:</strong> ${unknownCodes.join(', ')} — not included in dispatch</div>`
                : '';

            if (relevant.length === 0) {
                resultsDiv.innerHTML = '<div class="error" style="color:red; padding:10px; border:1px solid red; border-radius:5px;">No valid codes found for this region.</div>';
                resultsDiv.classList.remove('hidden');
                if (unknownCodes.length > 0) setTimeout(() => showAddLocationPromptQueue(unknownCodes), 400);
                return;
            }

            // Trigger add-location prompts for unknown codes alongside valid dispatch
            if (unknownCodes.length > 0) setTimeout(() => showAddLocationPromptQueue(unknownCodes), 600);

            // Attach restockBy date and right form flag from parsed form counts
            const today = new Date();
            today.setHours(0,0,0,0);
            relevant.forEach(item => {
                const fc = window.parsedFormCounts[item.code];
                if (fc && fc.restockBy) {
                    item.restockBy = fc.restockBy;
                    // Parse M/D/YYYY into a date for comparison
                    const parts = fc.restockBy.split('/');
                    if (parts.length === 3) {
                        const d = new Date(parseInt(parts[2]), parseInt(parts[0])-1, parseInt(parts[1]));
                        d.setHours(0,0,0,0);
                        item.isSameDay = (d.getTime() === today.getTime());
                    }
                }
                if (fc && fc.hasRightForms && isGARightFormsEligible(item.code)) item.hasRightForms = true;
            });

            // Build unavailability set from comp days + manual flags
            const dateInput = document.getElementById('dispatchDate');
            const dateStr = dateInput && dateInput.value ? dateInput.value : '';

            // Phase 2 Stage 2b: respect already-persisted dispatcher decisions for
            // this date instead of re-running auto-assignment blind. Completed/
            // removed stops come out of the active board entirely and get
            // rehydrated into the Completed/Removed panel; already-reassigned
            // stops keep their persisted technician below instead of re-deriving
            // one from availability/fallback rules.
            const existingByCode = await fetchExistingAssignments(dateStr);
            window.removedStops = [];
            relevant = relevant.filter(item => {
                const existing = existingByCode[item.code];
                if (existing && (existing.status === 'completed' || existing.status === 'removed')) {
                    window.removedStops.push({
                        code: item.code,
                        tech: existing.techName,
                        reason: existing.status === 'completed' ? 'completed' : 'canceled',
                        name: (LOCATIONS[item.code] || {}).name || item.code,
                        snapshot: { code: item.code },
                        originalIndex: 0,
                        inQueue: false
                    });
                    return false;
                }
                return true;
            });

            // Auto-surface trouble tickets that landed in Supabase directly (via
            // mailgun-inbound.js) but were never pasted into the Location Codes
            // box -- without this, the board write alone is invisible until
            // someone manually adds the code. Only ticket-linked 'planned' rows
            // qualify (plain manual assignment-board entries with no ticket
            // aren't auto-surfaced), and only if not already covered by a pasted
            // code, so this can't create a duplicate stop.
            const pastedCodes = new Set(relevant.map(i => i.code));
            Object.entries(existingByCode).forEach(([code, existing]) => {
                if (existing.status === 'planned' && existing.ticket && !pastedCodes.has(code)) {
                    if (!LOCATIONS[code]) {
                        console.warn(`[dispatch] Auto-added ticket for ${code} skipped: not in LOCATIONS`);
                        return;
                    }
                    relevant.push({
                        code,
                        urgent: true,
                        fromTicket: true,
                        ticketWo: existing.ticket.woNumber,
                        ticketIssue: [existing.ticket.issueCategory, existing.ticket.issueDetail].filter(Boolean).join(' – '),
                        ticketSlaEnd: existing.ticket.slaEndsAt,
                    });
                }
            });

            const unavailable = dateStr ? getUnavailableTechsForDate(dateStr) : new Set(
                Object.entries(window.manualUnavailable).filter(([,v]) => v).map(([k]) => k)
            );

            const assignments = {};
            const allTechNames = Object.keys(TECHS);
            const _availRaw = allTechNames.filter(t => !unavailable.has(t));
            // Sort nearest-first using first ticket's location as reference point
            const _refCode = relevant[0]?.code;
            const availableTechs = _refCode
                ? sortTechsByDistance(_availRaw, _refCode, CURRENT_STATE).map(x => x.name)
                : _availRaw;

            // HARD-CODED CONTRACTOR ASSIGNMENTS - These ALWAYS go to specific contractors
            const CONTRACTOR_ASSIGNMENTS = {
                'FL1049': 'TechSpot',      // Santa Rosa County Publix - Navarre
                'FL1030': 'Arcitechx',     // Bay County Publix - 23rd
                'FL1093': 'Arcitechx'      // Bay County Publix - Panama City Beach
            };

            relevant.forEach(item => {
                let tech;
                const existing = existingByCode[item.code];
                // Only a genuine dispatcher reassignment (via the reassign dropdown)
                // should stick across reprocessing regardless of what availability
                // looks like now -- that's a deliberate human choice. 'auto' and
                // 'fallback_rule' assignments were the system's own guess given
                // availability at the time, so they get re-derived fresh on every
                // reprocess instead of being "honored" -- otherwise a fallback bump
                // sticks forever even after the primary tech comes back available,
                // which was the actual bug behind "re-enabled Robert but reprocessing
                // still leaves it on his backup," found 2026-07-21.
                const isManualOverride = existing && existing.status === 'planned' && existing.assignedBy === 'manual';

                if (isManualOverride && !unavailable.has(existing.techName)) {
                    // Honor the dispatcher's explicit reassignment, as long as that
                    // tech is still available today. If they've since been marked
                    // unavailable (comp day, BlueFolder sync, manual toggle), fall
                    // through below and re-derive like a fresh assignment instead of
                    // silently leaving a dispatch on someone who's out.
                    tech = existing.techName;
                } else if (CONTRACTOR_ASSIGNMENTS[item.code]) {
                    tech = CONTRACTOR_ASSIGNMENTS[item.code];
                } else {
                    // Always derive from the site's actual primary/fallback config,
                    // not from whatever was previously auto-assigned -- this is what
                    // lets a fallback bump revert to primary once primary is
                    // available again, and what keeps a still-unavailable primary
                    // routed to fallback/queue exactly like a fresh dispatch would.
                    const preferred = LOCATIONS[item.code].primaryTech || LOCATIONS[item.code].defaultTech;
                    const fallback  = LOCATIONS[item.code].fallbackTech;
                    
                    if (preferred && availableTechs.includes(preferred)) {
                        tech = preferred;
                    } else if (preferred && unavailable.has(preferred) && fallback && availableTechs.includes(fallback)) {
                        // Preferred is out — use named fallback
                        tech = fallback;
                        item.reassignedFrom = preferred;
                    } else if (preferred && unavailable.has(preferred) && availableTechs.length > 0) {
                        // Primary out, no fallback set — use first available but flag for prompt
                        tech = availableTechs[0];
                        item.reassignedFrom = preferred;
                        item.needsFallbackAssignment = true; // trigger UI prompt
                    } else if (preferred && !unavailable.has(preferred) && allTechNames.includes(preferred)) {
                        // Preferred exists and not marked unavailable (edge case)
                        tech = preferred;
                    } else if (!preferred || !allTechNames.includes(preferred)) {
                        // No usable saved default at all -- either nothing saved,
                        // OR a stale/mismatched name that doesn't match anyone on
                        // the current roster. Found 2026-07-22: index.html's
                        // legacy hardcoded LOCATIONS_NV/OH/etc objects (leftover
                        // from before the Supabase migration) already have
                        // defaultTech values for many of these "missing default"
                        // sites, but with drifted names -- e.g. "Timothy Stoffel"
                        // vs the real roster's "Tim Stoffel", or "AJ Willis" who
                        // isn't on the current NV roster at all. A truthy-but-
                        // wrong value silently passed the old `!preferred` check
                        // and skipped the flag entirely, which is why the "Set
                        // Default" button wasn't showing up for the NV sites that
                        // already had a (wrong) hardcoded name.
                        tech = availableTechs[0] || allTechNames[0];
                        item.noSavedDefault = true;
                    } else {
                        tech = availableTechs[0] || allTechNames[0];
                    }
                }
                
                if (!assignments[tech]) assignments[tech] = [];
                assignments[tech].push(item);
            });

            window.currentAssignments = assignments;

            // Phase 2 Stage 2: persist this dispatch generation as the initial
            // assignment record for each stop. Best-effort/non-blocking -- see
            // syncAssignmentToSupabase. Only attach the ticket when this run was
            // for a single ticket (dueDate/woNumber dispatches); bulk restock-list
            // runs are the common case and stay unlinked, matching Stage 1 scope.
            const singleTicketWo = (relevant.length === 1 && window.ticketMeta && window.ticketMeta.woNumber)
                ? window.ticketMeta.woNumber : null;
            Object.entries(assignments).forEach(([tech, stops]) => {
                stops.forEach(item => {
                    // Skip re-sync only when we actually honored the existing persisted
                    // assignment unchanged -- re-syncing an unchanged assignment would
                    // overwrite assigned_by provenance (e.g. a manual reassignment) back
                    // to 'auto'. If the tech changed (bumped for unavailability above),
                    // fall through and sync the new assignment so Supabase doesn't keep
                    // pointing at someone who's now marked out.
                    if (existingByCode[item.code] && existingByCode[item.code].techName === tech) return;
                    const assignedBy = CONTRACTOR_ASSIGNMENTS[item.code] ? 'contractor_rule'
                        : (item.reassignedFrom ? 'fallback_rule' : 'auto');
                    syncAssignmentToSupabase(tech, item, 'planned', assignedBy,
                        singleTicketWo ? { ticketWoNumber: singleTicketWo } : {});
                });
            });

            renderReviewBoard();

            // Collect locations where primary was out and no fallback was set
            const needsFallback = [];
            Object.values(assignments).forEach(stops => {
                stops.forEach(item => {
                    if (item.needsFallbackAssignment) needsFallback.push(item);
                });
            });
            if (needsFallback.length > 0) {
                setTimeout(() => showFallbackAssignmentQueue(needsFallback, availableTechs), 400);
            }
            // Also rebuild printable summary for PDF/print view
            const regionLabel = CURRENT_STATE === 'FL'
                ? 'Florida'
                : (CURRENT_STATE === 'GA' ? 'Georgia / NC / SC' : CURRENT_STATE);
            window._lastDateStr = dateStr;
            window._lastRegionLabel = regionLabel;
            buildPrintableReport(window.currentAssignments, dateStr, regionLabel);
        }

        function renderReviewBoard(preserveScroll) {
            const resultsDiv = document.getElementById('results');
            const assignments = window.currentAssignments;
            const _savedScrollY = preserveScroll ? window.scrollY : null;

            // Live availability (not dispatch-time snapshot) for the reassign dropdown --
            // matches the same pattern showFallbackAssignmentQueue already uses, so marking
            // someone unavailable after dispatch generation removes them from Reassign too.
            const _dateInputForAvail = document.getElementById('dispatchDate');
            const _dateStrForAvail = _dateInputForAvail && _dateInputForAvail.value ? _dateInputForAvail.value : '';
            const currentUnavailableTechs = _dateStrForAvail ? getUnavailableTechsForDate(_dateStrForAvail) : new Set(
                Object.entries(window.manualUnavailable).filter(([,v]) => v).map(([k]) => k)
            );

            // Build header — for urgent mode show ticket context if available
            const meta = window.ticketMeta || {};
            const hasUrgentItems = Object.values(assignments).some(stops => stops.some(i => i.urgent));
            let headerHtml;
            if (hasUrgentItems && (meta.issueDetail || meta.dueDate)) {
                const issue = meta.issueDetail ? `<span style="color:#f0f0f0;">${meta.issueDetail}</span>` : '';
                const slaStr = meta.slaEnd || (meta.dueDate ? formatDueDate(meta.dueDate) : '');
                const sla = slaStr ? ` &mdash; <span style="color:#ffa500;">SLA ends ${slaStr}</span>` : '';
                const wo = meta.woNumber ? ` <span style="color:#aaa;font-size:12px;">WO ${meta.woNumber}</span>` : '';
                headerHtml = `<div style="margin-bottom:15px;"><span style="font-weight:bold;color:#ff6b35;">⚡ URGENT</span>${wo}<br><span style="font-size:13px;">${issue}${sla}</span></div>`;
            } else {
                headerHtml = '<div style="margin-bottom:15px; font-weight:bold; color:#007bff;">Generated Dispatches:</div>';
            }

            // Detect same-day items and right form flags across all assignments
            const allItems = Object.values(assignments).flat();
            const sameDayItems = allItems.filter(i => i.isSameDay);
            const rightFormItems = allItems.filter(i => i.hasRightForms);

            // Same-day alert banner
            // Remote cluster detection — hardcoded legacy + database-driven loc.cluster
            // Savannah codes always go to Whitehead — exclude from preemptive restock banner
            const SAVANNAH_CODES = new Set(['GA1072','GA1073','GA1074','GA1095']);
            const REMOTE_CLUSTERS = CURRENT_STATE === 'GA' ? {
                'Augusta area': ['GA1017','GA1050','GA1102','GA1108','GA1112'],
                'Charlotte NC': ['NC1001','NC1003','NC1004','NC1008'],
                'Fayette/Clayton corridor': ['GA1100'],
                // 'Columbus/Albany': []  -- pending Gina confirmation of site codes
            } : {};
            const dispatchedCodes = new Set(Object.values(assignments).flat().map(i => i.code));
            let clusterBannerHtml = '';

            // Fire banner for hardcoded clusters
            Object.entries(REMOTE_CLUSTERS).forEach(([clusterName, codes]) => {
                const matchedCodes = codes.filter(c => dispatchedCodes.has(c));
                if (matchedCodes.length > 0) {
                    const matchedNames = matchedCodes.map(c => (LOCATIONS[c] || {}).name || c).join(', ');
                    clusterBannerHtml += `<div style="background:#1a2a3a;border:1px solid #2a6496;border-radius:4px;padding:8px 12px;margin-bottom:8px;font-size:13px;color:#7ec8e3;">
                        📍 <strong>${clusterName} dispatch detected</strong> — ${matchedNames}<br>
                        <span style="font-size:12px;color:#aaa;">Consider checking the <a href="https://restock-tracker.netlify.app" target="_blank" style="color:#7ec8e3;">Restock Tracker</a> for nearby sites that may benefit from a preemptive restock.</span>
                    </div>`;
                }
            });

            // Database-driven clusters — group dispatched locations by loc.cluster
            const hardcodedClustered = new Set(Object.values(REMOTE_CLUSTERS).flat());
            const dbClusterGroups = {};
            [...dispatchedCodes].forEach(c => {
                const loc = LOCATIONS[c];
                if (loc && loc.cluster && !hardcodedClustered.has(c) && !SAVANNAH_CODES.has(c)) {
                    if (!dbClusterGroups[loc.cluster]) dbClusterGroups[loc.cluster] = [];
                    dbClusterGroups[loc.cluster].push(c);
                }
            });
            Object.entries(dbClusterGroups).forEach(([clusterName, codes]) => {
                const names = codes.map(c => (LOCATIONS[c] || {}).name || c).join(', ');
                clusterBannerHtml += `<div style="background:#1a2a3a;border:1px solid #2a6496;border-radius:4px;padding:8px 12px;margin-bottom:8px;font-size:13px;color:#7ec8e3;">
                    📍 <strong>${clusterName} dispatch detected</strong> — ${names}<br>
                    <span style="font-size:12px;color:#aaa;">Consider checking the <a href="https://restock-tracker.netlify.app" target="_blank" style="color:#7ec8e3;">Restock Tracker</a> for nearby sites that may benefit from a preemptive restock.</span>
                </div>`;
            });

            // Also fire banner for remote-flagged locations not already in a cluster
            const allClusteredCodes = new Set([
                ...Object.values(REMOTE_CLUSTERS).flat(),
                ...Object.values(dbClusterGroups).flat()
            ]);
            const remoteFlagged = [...dispatchedCodes].filter(c =>
                (LOCATIONS[c] || {}).remote && !allClusteredCodes.has(c) && !SAVANNAH_CODES.has(c)
            );
            if (remoteFlagged.length > 0) {
                const remoteNames = remoteFlagged.map(c => (LOCATIONS[c] || {}).name || c).join(', ');
                clusterBannerHtml += `<div style="background:#1a2a3a;border:1px solid #2a6496;border-radius:4px;padding:8px 12px;margin-bottom:8px;font-size:13px;color:#7ec8e3;">
                    📍 <strong>Remote location dispatch detected</strong> — ${remoteNames}<br>
                    <span style="font-size:12px;color:#aaa;">Consider checking the <a href="https://restock-tracker.netlify.app" target="_blank" style="color:#7ec8e3;">Restock Tracker</a> for nearby sites that may benefit from a preemptive restock.</span>
                </div>`;
            }

            let html = (window.unknownCodesBannerHtml || '') + clusterBannerHtml + headerHtml;

            // Helper to render a tech card
            // Store route data globally so popover can access it
            if (!window.techRouteData) window.techRouteData = {};

            function renderTechCard(tech, items) {
                const techStart = TECHS[tech] ? (TECHS[tech].startLocation || '') : '';
                const stops = items.map(i => encodeURIComponent(LOCATIONS[i.code].address)).join('/');
                const mapLink = `https://www.google.com/maps/dir/${encodeURIComponent(techStart)}/${stops}/${encodeURIComponent(techStart)}`;
                const techKey = tech.replace(/\s+/g, '-');
                window.techRouteData[techKey] = { mapLink, codes: items.map(i => i.code) };

                let cardHtml = `<div class="tech-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                        <strong>${tech} (${items.length})</strong>
                        <div>
                            <button class="control-btn" style="background:#17a2b8; color:white;" onclick="showRoutePopover(event,'${techKey}')">🗺️ Route</button>
                        </div>
                    </div>
                    <div id="traffic-result-${techKey}" style="font-size:13px; color:#2e7d32; padding:2px 0; margin-bottom:4px;"></div>`;
                
                items.forEach((item, index) => {
                    const loc = LOCATIONS[item.code];
                    const urgentBadge = item.urgent ? '<span class="same-day-badge">⚡ SAME DAY</span>' : '';
                    const sameDayBadge = item.isSameDay && !item.urgent ? '<span class="same-day-badge" style="background:#8b1a1a;">🚨 TODAY</span>' : '';
                    const rightFormBadge = item.hasRightForms ? '<span style="background:#1a5c1a;color:#88dd88;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;">📋 Right Forms</span>' : '';
                    const reassignBadge = item.reassignedFrom 
                        ? `<span style="background:#856404;color:#fff;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;">↔ from ${item.reassignedFrom.split(' ')[0]}</span>` 
                        : '';
                    const noDefaultBadge = item.noSavedDefault
                        ? `<span style="background:#5a2d82;color:#fff;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;">⚠ no saved default</span>`
                        : '';
                    const restockByStr = item.restockBy ? `<span style="font-size:11px;color:#888;margin-left:6px;">by ${item.restockBy}</span>` : '';
                    const ticketInfoStr = item.fromTicket
                        ? `<div style="font-size:12px;color:#c0392b;margin-top:2px;">📋 WO ${item.ticketWo || '—'}${item.ticketIssue ? ' – ' + item.ticketIssue : ''}${item.ticketSlaEnd ? ` <strong>Due: ${formatServerSlaTime(item.ticketSlaEnd)}</strong>` : ''}</div>`
                        : '';
                    cardHtml += `<div class="os-stop">
                                <div style="margin-right:10px; display:flex; flex-direction:column;">
                                    <button class="move-btn" 
    onclick="moveStop('${tech}', ${index}, -1)"
    oncontextmenu="event.preventDefault(); moveStopToTop('${tech}', ${index});"
    ontouchstart="(function(btn,t,i){btn._lpt=setTimeout(()=>{btn._lpt=null;moveStopToTop(t,i);},600);})(this,'${tech}',${index})"
    ontouchend="(function(btn){if(btn._lpt){clearTimeout(btn._lpt);btn._lpt=null;}})(this)"
    ontouchmove="(function(btn){if(btn._lpt){clearTimeout(btn._lpt);btn._lpt=null;}})(this)"
    onmousedown="(function(btn,t,i){btn._lpt=setTimeout(()=>{btn._lpt=null;moveStopToTop(t,i);},600);})(this,'${tech}',${index})"
    onmouseup="(function(btn){if(btn._lpt){clearTimeout(btn._lpt);btn._lpt=null;}})(this)"
    title="Tap: move up one | Hold: move to top">▲</button>
                                    ${index > 0 ? `<button class="move-btn" onclick="moveStopToTop('${tech}', ${index})" title="Move to top (shows mileage from this tech)" style="font-size:9px;line-height:1;">⤒</button>` : ''}
                                    <button class="move-btn" onclick="moveStop('${tech}', ${index}, 1)">▼</button>
                                </div>
                                <div>
                                    <div><span onclick="showSiteHistory('${item.code}')" style="cursor:pointer;text-decoration:underline;text-decoration-style:dotted;" title="View recent visit history"><strong>${item.code}</strong> - ${loc.name}</span> ${urgentBadge}${sameDayBadge}${rightFormBadge}${reassignBadge}${noDefaultBadge}${restockByStr}</div>
                                    <div style="font-size:12px; color:#666;">${loc.address}</div>
                                    ${ticketInfoStr}
                                    ${window.driveTimeEnabled ? `<div id="dt-${techKey}-${index}" style="font-size:11px;color:#5bc8af;margin-top:2px;">🕐 —</div>` : ''}
                                </div>
                                <div style="margin-left:auto;display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
                                    <select class="control-btn" onchange="reassignStop('${tech}', ${index}, this.value)" style="padding:2px;">
                                        <option value="" disabled selected>Reassign</option>
                                        ${buildTechOptions(Object.keys(TECHS).filter(t => !currentUnavailableTechs.has(t)), item.code, CURRENT_STATE, '', new Set([tech]))}
                                    </select>
                                    <button class="control-btn" onclick="pushToTomorrow('${tech}', ${index})" style="font-size:10px;padding:2px 6px;background:#555;color:#fff;border:none;border-radius:3px;cursor:pointer;">${window._isFriday ? '→ Mon' : window._isSaturday ? '→ Mon' : '→ Tomorrow'}</button>
                                    ${item.noSavedDefault ? `<button class="control-btn" onclick="setAsDefaultTech('${tech}', ${index})" style="font-size:10px;padding:2px 6px;background:#5a2d82;color:#fff;border:none;border-radius:3px;cursor:pointer;">✓ Set Default</button>` : ''}
                                    <div style="display:flex;gap:3px;margin-top:2px;">
                                        <button class="control-btn" onclick="removeStop('${tech}', ${index}, 'completed')" style="font-size:10px;padding:2px 6px;background:#1a6b1a;color:#fff;border:none;border-radius:3px;cursor:pointer;">✓ Done</button>
                                        <button class="control-btn" onclick="removeStop('${tech}', ${index}, 'canceled')" style="font-size:10px;padding:2px 6px;background:#6b1a1a;color:#fff;border:none;border-radius:3px;cursor:pointer;">✗ Cancel</button>
                                    </div>
                                </div>
                             </div>`;
                });
                cardHtml += `</div>`;
                return cardHtml;
            }

            // Split techs into same-day and tomorrow buckets based on their stops
            const techsSameDay = Object.keys(assignments).sort().filter(t => 
                assignments[t].length > 0 && assignments[t].some(i => i.isSameDay)
            );
            const techsTomorrow = Object.keys(assignments).sort().filter(t => 
                assignments[t].length > 0 && !assignments[t].some(i => i.isSameDay)
            );
            // Techs with mixed today/tomorrow stops go in same-day section
            const allTechsOrdered = [...new Set([...techsSameDay, ...techsTomorrow])];

            if (sameDayItems.length > 0 && techsTomorrow.length > 0) {
                // Show section dividers
                html += `<div style="font-size:11px;font-weight:bold;color:#ff6b6b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Today — Action Required</div>`;
                html += `<div class="tech-cards-grid">`;
                techsSameDay.forEach(tech => { html += renderTechCard(tech, assignments[tech]); });
                html += `</div>`;
                html += `<div style="font-size:11px;font-weight:bold;color:#007bff;text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 8px;">Tomorrow</div>`;
                html += `<div class="tech-cards-grid">`;
                techsTomorrow.forEach(tech => { html += renderTechCard(tech, assignments[tech]); });
                html += `</div>`;
            } else {
                html += `<div class="tech-cards-grid">`;
                allTechsOrdered.forEach(tech => { html += renderTechCard(tech, assignments[tech]); });
                html += `</div>`;
            }

            // Session actions — split Tomorrow-pushed from Completed/Removed
            const removed = window.removedStops || [];
            const tomorrowEntries = removed.map((r, i) => ({ ...r, globalIdx: i })).filter(r => r.reason === 'pushed-tomorrow');
            const closedEntries   = removed.map((r, i) => ({ ...r, globalIdx: i })).filter(r => r.reason !== 'pushed-tomorrow');

            function renderActionSection(entries, sectionLabel) {
                if (entries.length === 0) return '';
                let s = `<div style="margin-top:20px;">`;
                s += `<div style="font-size:11px;font-weight:bold;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">${sectionLabel}</div>`;
                const byTech = {};
                entries.forEach(r => {
                    if (!byTech[r.tech]) byTech[r.tech] = [];
                    byTech[r.tech].push(r);
                });
                Object.keys(byTech).sort().forEach(tech => {
                    s += `<div style="background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:10px 14px;margin-bottom:8px;opacity:0.85;">`;
                    s += `<div style="font-weight:bold;color:#aaa;margin-bottom:6px;">&#x1F4CB; ${tech}</div>`;
                    byTech[tech].forEach(r => {
                        const icon  = r.reason === 'completed' ? '&#x2713;' : r.reason === 'canceled' ? '&#x2717;' : '&#x2192;';
                        const color = r.reason === 'completed' ? '#4caf50' : r.reason === 'canceled' ? '#e57373' : '#f0a500';
                        s += `<div style="font-size:12px;color:#888;padding:3px 0;display:flex;align-items:center;justify-content:space-between;gap:6px;"><span><span style="color:${color};font-weight:bold;">${icon}</span><span style="margin-left:5px;">${r.code} &mdash; ${r.name}</span></span><button onclick="undoStop(${r.globalIdx})" style="flex-shrink:0;font-size:11px;padding:3px 10px;background:#3a3a3a;color:#ddd;border:1px solid #666;border-radius:4px;cursor:pointer;">&#x21A9; Undo</button></div>`;
                    });
                    s += `</div>`;
                });
                s += `</div>`;
                return s;
            }

            html += renderActionSection(tomorrowEntries, '&#x2192; Pushed to Tomorrow This Session');
            html += renderActionSection(closedEntries,   '&#x2713; Completed / Removed Today');

            const secondBtn = window.innerWidth >= 960
                ? `<button class="big-btn" onclick="window.open('https://restock-tracker.netlify.app','_blank')" style="background:#17a2b8; margin-top:0;">📊 Restock Tracker</button>`
                : `<button class="big-btn" onclick="generateMobileReport()" style="background:#17a2b8; margin-top:0;">📄 Report</button>`;
            html += `<div style="display:flex; gap:10px; margin-top:20px;">
                        <button class="big-btn" onclick="generateFinalMessages()" style="background:#28a745; margin-top:0;">✅ Messages</button>
                        ${secondBtn}
                     </div>`;
            
            resultsDiv.innerHTML = html;
            resultsDiv.classList.remove('hidden');
            if (preserveScroll) {
                window.scrollTo(0, _savedScrollY);
            } else {
                setTimeout(() => resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
            }
            // Keep printable report in sync with board state
            if (window._lastDateStr) buildPrintableReport(window.currentAssignments, window._lastDateStr, window._lastRegionLabel);
            // Auto-populate drive times if enabled
            if (window.driveTimeEnabled) {
                Object.keys(window.currentAssignments).forEach(tech => {
                    if ((window.currentAssignments[tech] || []).length > 0) fetchDriveTimesForTech(tech);
                });
            }
            // Auto-populate distance to first stop for all techs
            Object.keys(window.currentAssignments).forEach(tech => {
                if ((window.currentAssignments[tech] || []).length > 0) {
                    checkTrafficForTech(tech);
                }
            });
        }

        // ── DRIVE TIME TOGGLE ────────────────────────────────────────────

        // ── INBOUND DISPATCH BANNER ─────────────────────────────────────────
        let _lastInboundKey = localStorage.getItem('lastSeenInboundKey') || null;
        let _inboundPollTimer = null;
        let _pendingInboundBody = null;

        function startInboundPolling() {
            checkForInboundDispatch();
            _inboundPollTimer = setInterval(checkForInboundDispatch, 60000); // check every 60s
        }

        async function checkForInboundDispatch() {
            try {
                const resp = await fetch('/.netlify/functions/get-latest-dispatch');
                if (!resp.ok) return;
                const data = await resp.json();
                if (!data.found || !data.body || data.body.length < 50) return;
                if (data.dispatchType !== 'restock') return; // only show banner for dispatch lists

                const key = data.inboundKey || data.receivedAt || data.body.substring(0, 50);
                if (key && key === _lastInboundKey) return; // already seen this one

                // New dispatch — show banner
                _pendingInboundBody = data.body;
                const detail = document.getElementById('inboundBannerDetail');
                if (detail) {
                    const states = (data.states || []).join(', ') || 'unknown';
                    const when = data.receivedAt ? new Date(data.receivedAt).toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}) : '';
                    detail.textContent = `States: ${states}${when ? ' · received ' + when : ''}`;
                }
                const banner = document.getElementById('inboundBanner');
                if (banner) banner.style.display = '';
            } catch(e) {
                // Silent fail — network or function error
            }
        }

        function loadInboundDispatch(bodyOverride) {
            var body = bodyOverride || _pendingInboundBody;
            if (!body) {
                fetch('/.netlify/functions/get-latest-dispatch')
                    .then(r => r.json())
                    .then(data => {
                        if (data.found && data.body) {
                            loadInboundDispatch(data.body);
                        }
                    }).catch(() => {});
                return;
            }
            const ta = document.getElementById('locationCodes');
            // Clear textarea, results, and any stale fallback dialog immediately before loading new content
            const staleDialog2 = document.getElementById('fallback-assign-prompt');
            if (staleDialog2) staleDialog2.remove();
            if (ta) {
                ta.value = '';
                const resultsDiv = document.getElementById('results');
                if (resultsDiv) resultsDiv.innerHTML = '';
            }
            // Set the key immediately so the 60s poll won't re-show the banner
            fetch('/.netlify/functions/get-latest-dispatch')
                .then(r => r.json())
                .then(d => {
                    const key = d.inboundKey || d.receivedAt || (d.body ? d.body.substring(0, 50) : null);
                    if (key) {
                        _lastInboundKey = key;
                        localStorage.setItem('lastSeenInboundKey', key);
                    }
                }).catch(() => {});
            if (ta) {
                ta.value = body;
                localStorage.setItem('lastDispatchText', body);
                autoDetectDispatchDate(body);
                dismissInboundBanner();
                // Update loaded dispatch label
                const statusEl = document.getElementById('dispatchListStatus');
                if (statusEl) {
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('en-US', {weekday:'short', month:'numeric', day:'numeric', year:'numeric'});
                    const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
                    statusEl.textContent = `📋 Dispatch list loaded: ${dateStr} at ${timeStr}`;
                    statusEl.style.color = '#4caf50';
                }
                // Clear previous results immediately so stale dispatches don't show
                const resultsDiv = document.getElementById('results');
                if (resultsDiv) resultsDiv.innerHTML = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                // Force DOM to commit textarea value before calling processDispatch
                ta.dispatchEvent(new Event('input'));
                setTimeout(() => {
                    if (ta.value.trim()) processDispatch();
                }, 500);
            }
        }

        function dismissInboundBanner() {
            const banner = document.getElementById('inboundBanner');
            if (banner) banner.style.display = 'none';
            // Save the current key immediately so polling won't re-show it
            if (_lastInboundKey) {
                localStorage.setItem('lastSeenInboundKey', _lastInboundKey);
            }
            // Also fetch to get the definitive key if we don't have it yet
            fetch('/.netlify/functions/get-latest-dispatch')
                .then(r => r.json())
                .then(d => {
                    const key = d.inboundKey || d.receivedAt || (d.body ? d.body.substring(0, 50) : null);
                    if (key) {
                        _lastInboundKey = key;
                        localStorage.setItem('lastSeenInboundKey', key);
                    }
                }).catch(()=>{});
            _pendingInboundBody = null;
        }

        // ── DRIVE TIME FETCH (per tech, diagonal Distance Matrix) ─────────────
        function fetchDriveTimesForTech(tech) {
            if (!window.google || !window.google.maps) return;
            const items = window.currentAssignments[tech] || [];
            if (items.length === 0) return;

            const techKey = tech.replace(/\s+/g, '-');
            const techInfo = TECHS[tech];
            if (!techInfo) return;

            // Build parallel origin/destination arrays for diagonal route legs
            // Leg i: origins[i] → destinations[i]
            const startLoc = techInfo.startLocation || '';
            const addrs = items.map(i => (LOCATIONS[i.code] || {}).address || '');
            const origins = [startLoc, ...addrs.slice(0, -1)];   // start + all but last stop
            const destinations = addrs;                            // all stops

            if (destinations.some(a => !a)) return; // skip if any address missing

            // Show loading indicators
            items.forEach((_, idx) => {
                const el = document.getElementById('dt-' + techKey + '-' + idx);
                if (el) el.innerHTML = '🕐 ...';
            });

            const service = new google.maps.DistanceMatrixService();
            service.getDistanceMatrix({
                origins,
                destinations,
                travelMode: 'DRIVING',
                unitSystem: google.maps.UnitSystem.IMPERIAL,
                drivingOptions: { departureTime: new Date(), trafficModel: 'bestguess' }
            }, (response, status) => {
                if (status !== 'OK') {
                    items.forEach((_, idx) => {
                        const el = document.getElementById('dt-' + techKey + '-' + idx);
                        if (el) el.innerHTML = '🕐 —';
                    });
                    return;
                }
                const legs = [];
                items.forEach((_, idx) => {
                    const row = response.rows[idx];
                    const el2 = row && row.elements[idx];
                    if (el2 && el2.status === 'OK') {
                        const dur = el2.duration_in_traffic ? el2.duration_in_traffic.text : el2.duration.text;
                        const dist = el2.distance.text;
                        legs.push({ duration: dur, distance: dist });
                        const domEl = document.getElementById('dt-' + techKey + '-' + idx);
                        if (domEl) domEl.innerHTML = '🕐 ' + dur + ' (' + dist + ')';
                    } else {
                        legs.push(null);
                        const domEl = document.getElementById('dt-' + techKey + '-' + idx);
                        if (domEl) domEl.innerHTML = '🕐 —';
                    }
                });
                window.driveTimeData[techKey] = legs;
                // Refresh print report with new data
                if (window._lastDateStr) buildPrintableReport(window.currentAssignments, window._lastDateStr, window._lastRegionLabel);
            });
        }

        function checkTrafficForTech(tech) {
            const safeTechId = tech.replace(/\s+/g, '-');
            const resultDiv = document.getElementById(`traffic-result-${safeTechId}`);
            if (!resultDiv) { console.error("Traffic div not found for " + safeTechId); return; }

            const items = window.currentAssignments[tech];
            if (!items || !items.length) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = 'No stops assigned.';
                return;
            }

            const firstLocCode = items[0].code;
            const info = getTechDistance(tech, firstLocCode, CURRENT_STATE);

            resultDiv.style.display = 'block';
            if (info && info.label) {
                resultDiv.innerHTML = `🚗 <strong>To 1st Stop:</strong> ${info.label}`;
            } else {
                resultDiv.innerHTML = '📍 Distance data not available — run distance matrix first.';
            }
        }

        function moveStop(tech, index, direction) {
            const arr = window.currentAssignments[tech];
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= arr.length) return; 
            [arr[index], arr[newIndex]] = [arr[newIndex], arr[index]];
            renderReviewBoard(true);
        }

        function moveStopToTop(tech, index) {
            if (index === 0) return;
            const arr = window.currentAssignments[tech];
            const item = arr.splice(index, 1)[0];
            arr.unshift(item);
            renderReviewBoard(true);
        }

        // Phase 2 Stage 2: persists one dispatcher action to Supabase `assignments`.
        // Fire-and-forget on purpose -- a Supabase/network failure here must never
        // block or visibly break the dispatcher's UI action, which is why nothing
        // in removeStop/pushToTomorrow/reassignStop/processDispatch awaits this or
        // branches on its result. Errors are logged to console only.
        function syncAssignmentToSupabase(tech, item, status, assignedBy, opts) {
            opts = opts || {};
            const dispatchDate = opts.dispatchDateOverride || (function() {
                const dateInput = document.getElementById('dispatchDate');
                return dateInput && dateInput.value ? dateInput.value : '';
            })();
            if (!dispatchDate || !item || !item.code || !tech) return;
            const payload = {
                dispatchDate: dispatchDate,
                siteCode: item.code,
                techName: tech,
                status: status,
                assignedBy: assignedBy,
            };
            if (opts.ticketWoNumber) payload.ticketWoNumber = opts.ticketWoNumber;
            fetch('/.netlify/functions/save-assignment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(data => {
                if (!data.ok) console.error('[save-assignment] sync rejected:', data.error);
            }).catch(err => console.error('[save-assignment] sync failed (non-fatal):', err.message));
        }

        // Phase 2 Stage 2b: reads back persisted assignment state for a date, so
        // dispatch generation respects prior dispatcher decisions (completed,
        // cancelled, reassigned) instead of re-running auto-assignment blind.
        // Returns {} on any failure -- if this can't be reached, dispatch
        // generation just falls back to the original always-auto-assign behavior
        // rather than blocking the dispatcher from working.
        async function fetchExistingAssignments(dateStr) {
            if (!dateStr) return {};
            try {
                const res = await fetch('/.netlify/functions/get-assignments?dispatchDate=' + encodeURIComponent(dateStr));
                if (!res.ok) return {};
                const data = await res.json();
                const byCode = {};
                (data.assignments || []).forEach(a => { byCode[a.siteCode] = a; });
                return byCode;
            } catch (err) {
                console.error('[get-assignments] fetch failed (non-fatal, falling back to auto-assign):', err.message);
                return {};
            }
        }

        function removeStop(tech, index, reason) {
            const assignments = window.currentAssignments;
            const item = assignments[tech][index];
            if (!item) return;
            if (!window.removedStops) window.removedStops = [];
            window.removedStops.push({
                code: item.code,
                tech,
                reason,
                name: (LOCATIONS[item.code] || {}).name || item.code,
                snapshot: JSON.parse(JSON.stringify(item)),
                originalIndex: index,
                inQueue: false
            });
            assignments[tech].splice(index, 1);
            syncAssignmentToSupabase(tech, item, reason === 'completed' ? 'completed' : 'removed', 'manual');
            renderReviewBoard(true);
        }

        function pushToTomorrow(tech, index) {
            // Saturday or Friday → push to Monday
            const pushLabel = (window._isSaturday || window._isFriday) ? 'Monday' : 'Tomorrow';
            const assignments = window.currentAssignments;
            const item = assignments[tech][index];
            if (!item) return;
            if (!window.removedStops) window.removedStops = [];
            window.removedStops.push({
                code: item.code,
                tech,
                reason: 'pushed-tomorrow',
                name: (LOCATIONS[item.code] || {}).name || item.code,
                snapshot: JSON.parse(JSON.stringify(item)),
                originalIndex: index,
                inQueue: true
            });
            item.isSameDay = false;
            item.urgent = false;
            if (item.restockBy) {
                const parts = item.restockBy.split('/');
                if (parts.length === 3) {
                    const d = new Date(parseInt(parts[2]), parseInt(parts[0])-1, parseInt(parts[1]));
                    d.setDate(d.getDate() + 1);
                    item.restockBy = `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
                }
            }
            const dateInput = document.getElementById('dispatchDate');
            const todayStr = dateInput && dateInput.value ? dateInput.value : '';
            if (todayStr) {
                const [y, m, d] = todayStr.split('-').map(Number);
                const nextDate = new Date(y, m - 1, d);
                const dayOffset = window._isSaturday ? 2 : (window._isFriday ? 3 : 1);
                nextDate.setDate(nextDate.getDate() + dayOffset);
                const nextDateStr = `${nextDate.getFullYear()}-${String(nextDate.getMonth()+1).padStart(2,'0')}-${String(nextDate.getDate()).padStart(2,'0')}`;
                syncAssignmentToSupabase(tech, item, 'removed', 'manual', { dispatchDateOverride: todayStr });
                syncAssignmentToSupabase(tech, item, 'planned', 'manual', { dispatchDateOverride: nextDateStr });
            }
            renderReviewBoard(true);
        }

        function undoStop(removedIndex) {
            if (!window.removedStops) return;
            const entry = window.removedStops[removedIndex];
            if (!entry) return;
            const assignments = window.currentAssignments;
            if (!assignments[entry.tech]) assignments[entry.tech] = [];
            if (entry.inQueue) {
                // Item is still in queue (pushed-tomorrow) — find it and restore pre-push state
                const queueItem = assignments[entry.tech].find(i => i.code === entry.code);
                if (queueItem) Object.assign(queueItem, entry.snapshot);
            } else {
                // Item was removed — splice back at original position
                const insertAt = Math.min(entry.originalIndex, assignments[entry.tech].length);
                assignments[entry.tech].splice(insertAt, 0, JSON.parse(JSON.stringify(entry.snapshot)));
            }
            window.removedStops.splice(removedIndex, 1);
            renderReviewBoard(true);
        }

        // Companion to showReassignPrompt's "Yes, save it" path -- but for stops
        // that landed on the naive last-resort fallback (no saved primaryTech at
        // all) where the fallback tech is actually correct. reassignStop()'s
        // dropdown excludes the currently-assigned tech from its own options, so
        // there's no way to trigger the normal save-as-default prompt by
        // "reassigning" a stop to the tech it's already on. This is the explicit
        // action for that case, found 2026-07-22.
        function setAsDefaultTech(tech, index) {
            const item = window.currentAssignments[tech][index];
            const loc = LOCATIONS[item.code];
            if (!loc) return;
            const state = item.code.substring(0, 2);
            fetch('/.netlify/functions/save-location', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: item.code,
                    state: state,
                    name: loc.name || '',
                    address: loc.address || '',
                    primaryTech: tech,
                    fallbackTech: loc.fallbackTech || '',
                    contractorOverride: false,
                    contractorName: loc.contractorName || ''
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    loc.primaryTech = tech;
                    loc.defaultTech = tech;
                    item.noSavedDefault = false;
                    renderReviewBoard(true);
                }
            })
            .catch(() => {});
        }

        function reassignStop(oldTech, index, newTech) {
            if (oldTech === newTech) return;
            const item = window.currentAssignments[oldTech][index];
            window.currentAssignments[oldTech].splice(index, 1);
            if (!window.currentAssignments[newTech]) window.currentAssignments[newTech] = [];
            window.currentAssignments[newTech].unshift(item);
            syncAssignmentToSupabase(newTech, item, 'planned', 'manual');
            renderReviewBoard(true);
            // Recalc travel time for receiving tech so "To 1st Stop" reflects the reassigned stop
            if (window.google && window.google.maps && window.currentAssignments[newTech].length > 0) {
                checkTrafficForTech(newTech);
            }

            // Prompt to make permanent (skip contractor-override locations)
            const loc = LOCATIONS[item.code];
            if (!loc || loc.contractorOverride) return;
            const currentPrimary = loc.primaryTech || loc.defaultTech || 'unassigned';
            showReassignPrompt(item.code, loc.name || item.code, currentPrimary, newTech, loc);
        }

            var existing = document.getElementById('reassign-prompt');

        function showFallbackAssignmentQueue(items, availableTechs) {
            if (!items || items.length === 0) return;
            // Filter out items that no longer belong to the current state
            items = items.filter(i => {
                const statePrefix = (i.code || '').substring(0, 2);
                return CURRENT_STATE === 'GA'
                    ? ['GA','NC','SC'].includes(statePrefix)
                    : statePrefix === CURRENT_STATE;
            });
            if (items.length === 0) return;
            var item = items[0];
            var remaining = items.slice(1);
            var loc = LOCATIONS[item.code] || {};
            var code = item.code;
            var locName = loc.name || code;
            var primaryTech = item.reassignedFrom || loc.primaryTech || loc.defaultTech || '?';

            var existing = document.getElementById('fallback-assign-prompt');
            if (existing) existing.remove();

            // Rebuild available techs from CURRENT availability state (not dispatch-time snapshot)
            const dateInput = document.getElementById('dispatchDate');
            const dateStr = dateInput && dateInput.value ? dateInput.value : '';
            const currentUnavailable = dateStr ? getUnavailableTechsForDate(dateStr) : new Set(
                Object.entries(window.manualUnavailable).filter(([,v]) => v).map(([k]) => k)
            );
            var liveAvailableTechs = Object.keys(TECHS).filter(t => !currentUnavailable.has(t));
            // Sort nearest-first and annotate with distance label
            var techOptions = buildTechOptions(liveAvailableTechs, code, CURRENT_STATE, '', new Set([primaryTech]));
            // Check if there's already a fallback set but it's also unavailable — hide save button in that case
            var existingFallback = loc.fallbackTech;
            var fallbackAlsoUnavailable = existingFallback && currentUnavailable.has(existingFallback);
            var saveButtonHtml = fallbackAlsoUnavailable 
                ? '' // Don't offer to save permanently when fallback is also just out today
                : `<button id="fap-save" style="flex:1;padding:8px;background:#28a745;color:white;border:none;border-radius:5px;font-size:13px;cursor:pointer;">Assign &amp; save as fallback</button>`;

            var div = document.createElement('div');
            div.id = 'fallback-assign-prompt';
            div.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e1e2e;border:1px solid #ffa500;border-radius:8px;padding:16px 18px;z-index:9999;width:min(92vw,420px);box-shadow:0 4px 24px rgba(0,0,0,0.6);font-size:14px;color:#f0f0f0;';
            div.innerHTML = `
                <div style="font-weight:bold;color:#ffa500;margin-bottom:6px;">&#9888; ${fallbackAlsoUnavailable ? 'Fallback also unavailable' : 'No fallback set'}</div>
                <div style="margin-bottom:4px;"><strong>${code}</strong> — ${locName}</div>
                <div style="color:#aaa;margin-bottom:12px;font-size:13px;">${primaryTech} is unavailable. Who should cover this?${remaining.length > 0 ? ` <span style="color:#666;">(${remaining.length} more after this)</span>` : ''}</div>
                <select id="fap-tech" style="width:100%;box-sizing:border-box;padding:7px 9px;margin-bottom:10px;border-radius:5px;border:1px solid #555;background:#2a2a3e;color:#f0f0f0;font-size:13px;">
                    <option value="">-- Select technician --</option>
                    ${techOptions}
                </select>
                <div style="display:flex;gap:8px;margin-bottom:8px;">
                    <button id="fap-assign" style="flex:1;padding:8px;background:#007bff;color:white;border:none;border-radius:5px;font-size:13px;cursor:pointer;">Assign (session only)</button>
                    ${saveButtonHtml}
                </div>
                <div style="display:flex;gap:8px;">
                    <button id="fap-skip" style="flex:1;padding:6px;background:transparent;color:#666;border:1px solid #444;border-radius:5px;font-size:12px;cursor:pointer;">Skip</button>
                    ${remaining.length > 0 ? `<button id="fap-skip-all" style="flex:1;padding:6px;background:transparent;color:#c00;border:1px solid #c00;border-radius:5px;font-size:12px;cursor:pointer;">Skip All (${remaining.length + 1})</button>` : ''}
                </div>`;
            document.body.appendChild(div);

            function doAssign(savePermanent) {
                var newTech = document.getElementById('fap-tech').value;
                if (!newTech) return;
                var movedStop = null;
                // Remove from wherever it currently is
                Object.keys(window.currentAssignments).forEach(t => {
                    var idx = window.currentAssignments[t].findIndex(i => i.code === code && i.needsFallbackAssignment);
                    if (idx !== -1) {
                        movedStop = window.currentAssignments[t].splice(idx, 1)[0];
                    }
                });
                // Always add to the selected tech
                if (movedStop) {
                    movedStop.needsFallbackAssignment = false;
                    if (!window.currentAssignments[newTech]) window.currentAssignments[newTech] = [];
                    window.currentAssignments[newTech].unshift(movedStop);
                }
                renderReviewBoard(true);
                div.remove();
                if (savePermanent) {
                    var state = code.substring(0, 2);
                    fetch('/.netlify/functions/save-location', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            code, state,
                            name: loc.name || '',
                            address: loc.address || '',
                            primaryTech: loc.primaryTech || loc.defaultTech || '',
                            defaultTech: loc.primaryTech || loc.defaultTech || '',
                            fallbackTech: newTech,
                            contractorOverride: false,
                            contractorName: loc.contractorName || '',
                            machineType: loc.machineType || 'SK',
                            remote: loc.remote || false
                        })
                    })
                    .then(r => r.json())
                    .then(data => {
                        if (data.ok) {
                            loc.fallbackTech = newTech;
                            // Brief toast so dispatcher knows the save landed
                            var toast = document.createElement('div');
                            toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#28a745;color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,0.3);';
                            toast.textContent = '✓ Fallback saved: ' + code + ' → ' + newTech;
                            document.body.appendChild(toast);
                            setTimeout(function() { toast.remove(); }, 3500);
                        } else {
                            var toast = document.createElement('div');
                            toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#dc3545;color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;z-index:9999;';
                            toast.textContent = '⚠ Save failed for ' + code + ' — session only';
                            document.body.appendChild(toast);
                            setTimeout(function() { toast.remove(); }, 4000);
                        }
                    })
                    .catch(() => {
                        var toast = document.createElement('div');
                        toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#dc3545;color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;z-index:9999;';
                        toast.textContent = '⚠ Network error saving ' + code + ' fallback';
                        document.body.appendChild(toast);
                        setTimeout(function() { toast.remove(); }, 4000);
                    });

        function generateFinalMessages() {
            const resultsDiv = document.getElementById('results');
            const dateInput = document.getElementById('dispatchDate');
            
            let dispatchDate = new Date();
            if (dateInput && dateInput.value) {
                dispatchDate = new Date(dateInput.value + 'T12:00:00');
            }
            
            const dateStr = dispatchDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const today = new Date();
            const isToday = (dispatchDate.toDateString() === today.toDateString());
            
            const urgencySelector = document.getElementById('urgencySelector');
            const isUrgentMode = urgencySelector && urgencySelector.value === 'urgent';
            const baseContext = (isToday || isUrgentMode) ? 'today' : `tomorrow ${dateStr}`;

            let html = `<div style="margin-bottom:20px;"><button class="big-btn" onclick="renderReviewBoard()" style="background:#6c757d;">⬅ Back</button></div>`;
            
            Object.keys(window.currentAssignments).sort().filter(t => window.currentAssignments[t].length > 0).forEach(tech => {
                const items = window.currentAssignments[tech];
                const info = TECHS[tech];
                const hasUrgent = items.some(i => i.urgent);
                
                const meta = window.ticketMeta || {};

                let msg;
                if (hasUrgent && items.length === 1 && items[0].urgent) {
                    // Single urgent ticket — use trouble ticket format
                    const item = items[0];
                    const loc = LOCATIONS[item.code];
                    const reassignNote = ''; // covering-for note removed — dispatcher context only
                    let issueStr = meta.issueDetail || 'Trouble ticket';
                    const slaStr = meta.slaEnd || (meta.dueDate ? formatDueDate(meta.dueDate) : '');
                    if (slaStr) issueStr += ` (SLA ends ${slaStr})`;
                    msg = `⚡ URGENT - Hey ${info.firstName}, a trouble ticket for ${loc.name} just came in:\n\n`;
                    msg += `1. ${issueStr}${reassignNote}\n`;
                    const warnings = checkConsumables(item.code);
                    if (warnings.length > 0) warnings.forEach(w => { msg += `   ${w}\n`; });
                } else {
                    // Standard dispatch or multiple urgent stops
                    const header = hasUrgent ? '⚡ URGENT - ' : '';
                    msg = `${header}Hey ${info.firstName}, here's your dispatches for ${baseContext}:\n\n`;
                    items.forEach((item, i) => {
                        const loc = LOCATIONS[item.code];
                        const prefix = '';
                        const reassignNote = ''; // covering-for note removed — dispatcher context only
                        let issueStr = '';
                        if (item.urgent && meta.issueDetail) {
                            issueStr = ` - ${meta.issueDetail}`;
                            const slaStr = meta.slaEnd || (meta.dueDate ? formatDueDate(meta.dueDate) : '');
                    if (slaStr) issueStr += ` (SLA ends ${slaStr})`;
                        }
                        const stopType = item.urgent ? issueStr : (item.isSameDay ? ' - Consumable Restock ⚡ COMPLETE TODAY' : ' - Consumable Restock');
                        msg += `${i + 1}. ${prefix}${loc.name}${stopType}${reassignNote}\n`;

                        // Append consumables detail for restock stops
                        if (!item.urgent) {
                            const fc = (window.parsedFormCounts || {})[item.code];
                            if (fc) {
                                // Consumables requested
                                if (fc.consumables) {
                                    const rfFlag = fc.hasRightForms ? ' ⚠️ RIGHT FORMS' : '';
                                    msg += `   Items: ${fc.consumables}${rfFlag}\n`;
                                } else if (fc.hasRightForms) {
                                    msg += `   Items: ⚠️ RIGHT FORMS\n`;
                                }
                                // Form counts — LF always, LR only if ribbon warning applies, Journal if present
                                const RESTOCK_COUNT = isSurfboard(item.code) ? 700 : 800;
                                const listed2 = (fc.consumables || '').toLowerCase();
                                const leftFormsReq = listed2.includes('left forms');
                                const ribbonRequested = listed2.includes('ribbon');
                                const parts = [];
                                if (isBigHoku(item.code)) {
                                    if (fc.formsCount > 0) parts.push(`RF×${fc.formsCount}`);
                                    if (fc.ribbonCount > 0) parts.push(`RIB×${fc.ribbonCount}`);
                                    if (fc.Journal !== null && fc.Journal !== undefined) parts.push(`J: ${fc.Journal}`);
                                } else {
                                const showLR = !ribbonRequested && typeof fc.LR === 'number' && (
                                    (typeof fc.LF === 'number' && fc.LR < fc.LF) ||
                                    (leftFormsReq && fc.LR < RESTOCK_COUNT)
                                );
                                const rightFormsRequested2 = listed2.includes('right forms');
                                if (fc.LF !== undefined && fc.LF !== null) parts.push(`LF: ${fc.LF}`);
                                if (showLR) parts.push(`LR: ${fc.LR} ⚠️`);
                                if (fc.RF !== undefined && fc.RF !== null && fc.RF > 0) {
                                    const rfNote = isGARightFormsEligible(item.code) && fc.RF <= 200 ? ` ⚠️ Swap RF forms with larger partial` : '';
                                    parts.push(`RF: ${fc.RF}${rfNote}`);
                                }
                                if (fc.Journal !== null && fc.Journal !== undefined) {
                                    const journalRequested = listed2.includes('journal');
                                    const journalLow = fc.Journal < JOURNAL_LOW_THRESHOLD;
                                    if (journalRequested || journalLow) {
                                        const jLabel = fc.Journal < 850 ? `J: ${fc.Journal} — Journal Paper critically low or out` :
                                                       fc.Journal < JOURNAL_LOW_THRESHOLD ? `J: ${fc.Journal} — Journal Paper low` :
                                                       `J: ${fc.Journal}`;
                                        parts.push(jLabel);
                                    }
                                }
                                }
                                if (parts.length > 0) msg += `   Counts: ${parts.join(' | ')}\n`;
                            }
                        }

                        const warnings = checkConsumables(item.code);
                        if (warnings.length > 0) warnings.forEach(w => { msg += `   ${w}\n`; });
                    });
                }
                // ── Minimum consumables loadout tally ──
                const loadoutTally = { LF: 0, RF: 0, RIB: 0, JP: 0, BHFORMS: 0, BHRIB: 0 };
                let hasAnyRestock = false;
                (items || []).forEach(item => {
                    if (item.urgent) return;
                    const fc = (window.parsedFormCounts || {})[item.code];
                    if (!fc) return;
                    const listed = (fc.consumables || '').toLowerCase();
                    if (isBigHoku(item.code)) {
                        if (fc.formsCount > 0) { loadoutTally.BHFORMS += fc.formsCount; hasAnyRestock = true; }
                        if (fc.ribbonCount > 0) { loadoutTally.BHRIB += fc.ribbonCount; hasAnyRestock = true; }
                        if (listed.includes('journal')) { loadoutTally.JP++; hasAnyRestock = true; }
                    } else {
                    if (listed.includes('left forms'))  { loadoutTally.LF++;  hasAnyRestock = true; }
                    if (listed.includes('right forms')) { loadoutTally.RF++;  hasAnyRestock = true; }
                    if (listed.includes('ribbon'))      { loadoutTally.RIB++; hasAnyRestock = true; }
                    if (listed.includes('journal'))     { loadoutTally.JP++;  hasAnyRestock = true; }
                    }
                    if (item.urgent && listed) hasAnyRestock = true;
                });
                if (hasAnyRestock) {
                    const tally = [];
                    if (loadoutTally.LF      > 0) tally.push(`LF×${loadoutTally.LF}`);
                    const totalRF = loadoutTally.RF + loadoutTally.BHFORMS;
                    const totalRIB = loadoutTally.RIB + loadoutTally.BHRIB;
                    if (totalRF  > 0) tally.push(`RF×${totalRF}`);
                    if (totalRIB > 0) tally.push(`RIB×${totalRIB}`);
                    if (loadoutTally.JP > 0) tally.push(`JP×${loadoutTally.JP}`);
                    if (tally.length > 0) msg += `\n📦 Min loadout: ${tally.join('  ')}`;
                }
                if (window.dcoEnabled) msg += `\n🔔 DCO required — please confirm dispatch acknowledged per Gina.`;
                msg += `\nPlease acknowledge receipt.`;
                
                html += `<div class="tech-card">
                            <div class="tech-header">📱 ${tech}</div>
                            <div class="tech-message" id="msg-${tech.replace(/\s+/g, '-')}" contenteditable="true">${msg}</div>
                            <div style="display:flex;gap:8px;margin-top:10px;">
                                <button class="control-btn" style="background:#28a745;color:white;flex:1;" onclick="copyMessage('${tech.replace(/\s+/g, '-')}')">📋 Copy</button>
                                <button class="control-btn" style="background:#007bff;color:white;flex:1;" onclick="sendMessage('${tech.replace(/\s+/g, '-')}', '${tech}')">📤 Send</button>
                            </div>
                         </div>`;
            });
            resultsDiv.innerHTML = html;
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
