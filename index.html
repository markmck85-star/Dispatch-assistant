        async function sendMessage(id, techName) {
            const txt = document.getElementById(`msg-${id}`).innerText;
            if (!txt.trim()) { alert('No message to send.'); return; }

            // Look up SMS address and email from loaded tech data
            const techKey = techName.toLowerCase().replace(/\s+/g, '-');
            let smsAddress = null;
            let techEmail = null;

            try {
                const res = await fetch(`/.netlify/functions/get-technicians?state=${CURRENT_STATE}`);
                const data = await res.json();
                const tech = data[techKey];
                smsAddress = tech && tech.smsAddress ? tech.smsAddress : null;
                techEmail = tech && tech.email ? tech.email : null;
            } catch(e) {}

            if (!smsAddress && !techEmail) {
                smsAddress = prompt(`No SMS address set for ${techName}.\nEnter their carrier email (e.g. 6781234567@vtext.com):`);
                if (!smsAddress) return;
                if (confirm(`Save ${smsAddress} as ${techName}'s SMS address permanently?`)) {
                    fetch('/.netlify/functions/save-technician', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: techName, state: CURRENT_STATE, smsAddress })
                    }).catch(() => {});
                }
            }

            // Count stops for SMS ping
            const stopCount = (txt.match(/^\d+\./gm) || []).length;
            const dateMatch = txt.match(/\b(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),\s+\w+\s+\d+/i);
            const dateStr = dateMatch ? dateMatch[0] : 'tomorrow';
            const smsPing = `MCR Dispatch: You have ${stopCount} stop${stopCount !== 1 ? 's' : ''} for ${dateStr}. Details sent to your email.`;

            // Convert plain text to simple HTML email
            const htmlBody = '<pre style="font-family:Arial,sans-serif;font-size:14px;white-space:pre-wrap;">' + 
                txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + 
                '</pre>';

            // Show confirmation modal
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e1e2e;border:1px solid #007bff;border-radius:8px;padding:16px;z-index:9999;width:min(92vw,420px);box-shadow:0 4px 24px rgba(0,0,0,0.6);font-size:14px;color:#f0f0f0;';
            modal.innerHTML = `
                <div style="font-weight:bold;margin-bottom:8px;">📤 Send to ${techName}</div>
                ${techEmail ? `<div style="color:#5bc8af;font-size:12px;margin-bottom:4px;">📧 Email: ${techEmail}</div>` : ''}
                ${smsAddress ? `<div style="color:#aaa;font-size:12px;margin-bottom:8px;">📱 SMS ping: ${smsAddress}</div>` : ''}
                <textarea id="send-modal-txt" style="width:100%;box-sizing:border-box;height:160px;background:#2a2a3e;color:#f0f0f0;border:1px solid #555;border-radius:5px;padding:8px;font-size:13px;resize:vertical;">${txt}</textarea>
                <div style="display:flex;gap:8px;margin-top:10px;">
                    <button id="send-modal-cancel" style="flex:1;padding:8px;background:#444;color:#fff;border:none;border-radius:5px;cursor:pointer;">Cancel</button>
                    <button id="send-modal-confirm" style="flex:1;padding:8px;background:#007bff;color:#fff;border:none;border-radius:5px;cursor:pointer;">Confirm Send</button>
                </div>`;
            document.body.appendChild(modal);

            document.getElementById('send-modal-cancel').onclick = () => modal.remove();
            document.getElementById('send-modal-confirm').onclick = async () => {
                const finalTxt = document.getElementById('send-modal-txt').value;
                modal.remove();
                const finalHtml = '<pre style="font-family:Arial,sans-serif;font-size:14px;white-space:pre-wrap;">' + 
                    finalTxt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>';
                try {
                    const r = await fetch('/.netlify/functions/send-sms', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            to: smsAddress,
                            email: techEmail,
                            body: smsPing,
                            htmlBody: finalHtml,
                            subject: `MCR Dispatch — ${dateStr}`
                        })
                    });
                    const d = await r.json();
                    if (d.ok) {
                        alert(`✅ Sent to ${techName}!${techEmail ? '\n📧 Full details emailed' : ''}${smsAddress ? '\n📱 SMS ping sent' : ''}`);
                    } else {
                        alert(`❌ Send failed: ${d.error || 'Unknown error'}`);
                    }
                } catch(e) {
                    alert(`❌ Send failed: ${e.message}`);
                }
            };
        }

        function buildPrintableReport(assignments, dateStr, regionLabel) {
            const report = document.getElementById('printableReport');
            if (!report) return;

            // Determine correct "next day" label based on TODAY (generation day), not dispatch date
            const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const today = new Date();
            const todayDow = today.getDay();
            const dispatchDate = dateStr ? new Date(dateStr + 'T12:00:00') : new Date();
            const msPerDay = 86400000;
            const dayDiff = Math.round((dispatchDate - today) / msPerDay);
            // If dispatch is truly tomorrow (1 day out) call it Tomorrow, otherwise use day name
            // Friday generation: anything non-same-day runs Monday
            let nextDayLabel;
            if (todayDow === 5) {
                nextDayLabel = 'Monday';
            } else if (dayDiff <= 1) {
                nextDayLabel = 'Tomorrow';
            } else {
                nextDayLabel = DAY_NAMES[dispatchDate.getDay()];
            }

            let html = `
                <div class="print-header">
                    <div class="print-title">Dispatch Summary – ${regionLabel || ""}</div>
                    <div class="print-date">Restock / Service Date: ${dateStr || "(not set)"}</div>
                </div>
            `;

            if (!assignments || typeof assignments !== "object") {
                report.innerHTML = html + `<p>No assignments found.</p>`;
                return;
            }

            const allItems = Object.values(assignments).flat();
            const sameDayItems = allItems.filter(i => i.isSameDay);
            const rightFormItems = allItems.filter(i => i.hasRightForms);

            if (sameDayItems.length > 0) {
                html += `<div style="background:#fdeaea;border:1px solid #e24b4a;border-radius:4px;padding:6px 10px;margin-bottom:8px;font-size:12px;">
                    <strong>🚨 SAME DAY — Action Required:</strong> ${sameDayItems.map(i => i.code).join(', ')}
                </div>`;
            }
            if (rightFormItems.length > 0) {
                html += `<div style="background:#eaf3de;border:1px solid #639922;border-radius:4px;padding:6px 10px;margin-bottom:8px;font-size:12px;">
                    <strong>📋 Previous Year Right Forms Required:</strong> ${rightFormItems.map(i => i.code).join(', ')}
                </div>`;
            }

            const techNames = Object.keys(assignments).sort().filter(t => assignments[t].length > 0);
            const techsSameDay = techNames.filter(t => assignments[t].some(i => i.isSameDay));
            const techsTomorrow = techNames.filter(t => !assignments[t].some(i => i.isSameDay));

            function renderPrintTech(techName) {

                let block = `<div class="print-tech-section">
                    <div class="print-tech-header">${techName}</div>
                    <div class="print-tech-sub">Total stops: ${stops.length}</div>`;

                    const urgentBadge = stop.urgent ? `<span style="${badgeStyle}background:#c0392b;color:#fff;">SAME DAY</span>` : "";
                    const rfBadge = stop.hasRightForms ? `<span style="${badgeStyle}background:#2e7d32;color:#fff;">Right Forms</span>` : "";
                    const dateStr = stop.restockBy ? ` <span style="font-size:12px;color:#555;">by ${stop.restockBy}</span>` : "";

                    // Consumables detail
                    let consumDetail = '';
                    if (true) { // Show counts whenever available, regardless of urgent mode
                        const fc = (window.parsedFormCounts || {})[code];
                        if (fc) {
                            if (fc.consumables) {
                                const rfFlag = fc.hasRightForms ? ' <span style="color:#c0392b;font-weight:bold;">⚠️ RIGHT FORMS</span>' : '';

                            const RESTOCK_COUNT = isSurfboard(code) ? 700 : 800;
                            const listed = (fc.consumables || '').toLowerCase();
                            const ribbonRequested = listed.includes('ribbon');
                            const leftFormsReq = listed.includes('left forms');
                            const journalRequested = listed.includes('journal');
                            const journalLow = fc.Journal !== null && fc.Journal !== undefined && fc.Journal < JOURNAL_LOW_THRESHOLD;
                            const parts = [];
                            if (isBigHoku(code)) {
                                // Big Hoku 7000: show all printer counts
                                if (fc.P1F !== null && fc.P1F !== undefined) parts.push(`P1F: ${fc.P1F}`);
                                if (fc.P1R !== null && fc.P1R !== undefined) parts.push(`P1R: ${fc.P1R}`);

                                if (fc.P3R !== null && fc.P3R !== undefined) parts.push(`P3R: ${fc.P3R}`);

                            } else {

                                    (leftFormsReq && fc.LR < RESTOCK_COUNT)
                                );
                                if (fc.LF !== undefined && fc.LF !== null) parts.push(`LF: ${fc.LF}`);
                                if (showLR) parts.push(`LR: ${fc.LR} ⚠️`);
                                if (fc.RF !== undefined && fc.RF !== null && fc.RF > 0) {
                                    const rfNotePrint = isGARightFormsEligible(code) && fc.RF <= 200 ? ' ⚠️ Swap RF forms with larger partial' : '';
                                    parts.push(`RF: ${fc.RF}${rfNotePrint}`);
                                }
                                if (isSurfboard(code)) {
                                    if (ribbonRequested && fc.LR !== null && fc.LR !== undefined) parts.push(`LR: ${fc.LR}`);
                                    if (fc.Journal !== null && fc.Journal !== undefined) {
                                        const jSB = fc.Journal < 850 ? `J: ${fc.Journal} — critically low` : fc.Journal < JOURNAL_LOW_THRESHOLD ? `J: ${fc.Journal} — low` : `J: ${fc.Journal}`;
                                        parts.push(jSB);
                                    }
                                } else if ((journalRequested || journalLow) && fc.Journal !== null && fc.Journal !== undefined) {
                                    const jLabel = fc.Journal < 850 ? `J: ${fc.Journal} — Journal Paper critically low or out` :
                                                   fc.Journal < JOURNAL_LOW_THRESHOLD ? `J: ${fc.Journal} — Journal Paper low` : `J: ${fc.Journal}`;
                                    parts.push(jLabel);
                                }
                            }
                            if (parts.length > 0) consumDetail += `<div style="font-size:12px;color:#444;margin-top:1px;">Counts: ${parts.join(' | ')}</div>`;
                            const warnings = checkConsumables(code);
                            warnings.forEach(w => { consumDetail += `<div style="font-size:11px;color:#a32d2d;margin-top:2px;">${w}</div>`; });
                        }
                    }

                    const reassignNote = stop.reassignedFrom ? ` <span style="font-size:11px;color:#856404;font-weight:bold;">(covering for ${stop.reassignedFrom.split(' ')[0]})</span>` : '';
                    const techKey2 = techName ? techName.replace(/\s+/g, '-') : '';
                    const dtLegs = (window.driveTimeData[techKey2] || []);
                    const dtLeg = dtLegs[index];
                    const dtStr = dtLeg ? `<div style="font-size:11px;color:#2e7d32;margin-top:1px;">🕐 ${dtLeg.duration} (${dtLeg.distance})</div>` : '';
                    return `<div class="print-stop">
                        <div class="print-stop-name">${index + 1}. ${code} – ${name}${urgentBadge}${todayBadge}${rfBadge}${reassignNote}${dateStr}</div>
                        <div class="print-stop-addr">${addr}</div>
                        ${dtStr}
                        ${consumDetail}
                    </div>`;
                }

                if (hasMixed) {
                    block += `<div style="font-size:10px;font-weight:bold;color:#a32d2d;text-transform:uppercase;margin:6px 0 2px;border-top:1px solid #f5c6c6;padding-top:4px;">Today — Complete Now</div>`;
                    todayStops.forEach((stop, i) => { block += renderStop(stop, i); });
                    block += `<div style="font-size:10px;font-weight:bold;color:#185fa5;text-transform:uppercase;margin:8px 0 2px;border-top:1px solid #cce0f5;padding-top:4px;">${nextDayLabel}</div>`;
                    tomorrowStops.forEach((stop, i) => { block += renderStop(stop, todayStops.length + i); });
                } else {
                    stops.forEach((stop, index) => { block += renderStop(stop, index); });
                }

                // ── Minimum loadout tally for print report ──
                const pTally = { LF: 0, RF: 0, RIB: 0, JP: 0, BHFORMS: 0, BHRIB: 0 };
                let pHasRestock = false;
                stops.forEach(item => {
                    if (item.urgent) return;
                    const fc2 = (window.parsedFormCounts || {})[item.code];
                    if (!fc2) return;
                    const listed2 = (fc2.consumables || '').toLowerCase();
                    if (isBigHoku(item.code)) {
                        if (fc2.formsCount > 0) { pTally.BHFORMS += fc2.formsCount; pHasRestock = true; }
                        if (fc2.ribbonCount > 0) { pTally.BHRIB += fc2.ribbonCount; pHasRestock = true; }
                        if (listed2.includes('journal')) { pTally.JP++; pHasRestock = true; }
                    } else {
                    if (listed2.includes('left forms'))  { pTally.LF++;  pHasRestock = true; }
                    if (listed2.includes('right forms')) { pTally.RF++;  pHasRestock = true; }
                    if (listed2.includes('ribbon'))      { pTally.RIB++; pHasRestock = true; }
                    if (listed2.includes('journal'))     { pTally.JP++;  pHasRestock = true; }
                    }
                });
                if (pHasRestock) {
                    const pLine = [];
                    if (pTally.LF > 0) pLine.push(`LF×${pTally.LF}`);
                    const pTotalRF = pTally.RF + pTally.BHFORMS;
                    const pTotalRIB = pTally.RIB + pTally.BHRIB;
                    if (pTotalRF  > 0) pLine.push(`RF×${pTotalRF}`);
                    if (pTotalRIB > 0) pLine.push(`RIB×${pTotalRIB}`);
                    if (pTally.JP > 0) pLine.push(`JP×${pTally.JP}`);
                    if (pLine.length > 0) {
                        block += `<div style="margin-top:8px;padding:5px 8px;background:#f0f4ff;border-radius:4px;font-size:12px;font-weight:600;color:#1a3a6b;">📦 Min loadout: ${pLine.join('  ')}</div>`;
                    }
                }

                block += `</div>`;
                return block;
            }

            if (sameDayItems.length > 0 && techsTomorrow.length > 0) {
                html += `<div style="font-size:11px;font-weight:bold;color:#a32d2d;text-transform:uppercase;margin:8px 0 4px;">Today — Action Required</div>`;
                techsSameDay.forEach(t => { html += renderPrintTech(t); });
                html += `<div style="font-size:11px;font-weight:bold;color:#185fa5;text-transform:uppercase;margin:12px 0 4px;">${nextDayLabel}</div>`;
                techsTomorrow.forEach(t => { html += renderPrintTech(t); });
            } else {
                techNames.forEach(t => { html += renderPrintTech(t); });
            }

            report.innerHTML = html;
        }

        function printReport() {
            const report = document.getElementById('printableReport');
            if (!report || !report.innerHTML.trim()) {
                alert("Please generate dispatches first, then try printing.");
                return;
            }

            const content = report.innerHTML;
            // Build filename-friendly date from dispatch date
            const dispatchDateStr = window._lastDateStr || '';
            const dispatchLabel = dispatchDateStr
                ? (() => {
                    const d = new Date(dispatchDateStr + 'T12:00:00');
                    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' })
                        .replace(/,/g, '').replace(/\s+/g, '_');
                  })()
                : 'Undated';
            const docTitle = `Dispatch_Summary_${dispatchLabel}`;

            const html = `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${docTitle}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; font-size: 16px; color: #222; max-width: 700px; margin: 0 auto; }
  .print-btn { display: block; width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: 600; margin-bottom: 16px; cursor: pointer; }
  .print-header { margin-bottom: 16px; border-bottom: 2px solid #333; padding-bottom: 8px; }
  .print-title { font-size: 20px; font-weight: bold; }
  .print-date { font-size: 14px; color: #555; margin-top: 2px; }
  .print-tech-section { margin-bottom: 16px; border: 1px solid #ccc; border-radius: 6px; padding: 12px; page-break-inside: avoid; break-inside: avoid; }
  .print-tech-header { font-size: 18px; font-weight: bold; margin-bottom: 2px; }
  .print-tech-sub { font-size: 13px; color: #666; margin-bottom: 8px; }
  .print-stop { padding: 8px 0; border-bottom: 1px solid #eee; }
  .print-stop:last-child { border-bottom: none; }
  .print-stop-name { font-weight: 500; font-size: 15px; }
  .print-stop-addr { font-size: 13px; color: #555; margin-top: 2px; }
  @media print { .print-btn { display: none; } body { padding: 0; } }
</style>
</head><body>
<button class="print-btn" onclick="window.print()">🖨️ Save as PDF / Print</button>
${content}</body></html>`;

            const blob = new Blob([html], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            const printWin = window.open(blobUrl, '_blank');
            if (!printWin) {
                // Popup blocked — fall back to replacing page content temporarily
                URL.revokeObjectURL(blobUrl);
                const original = document.body.innerHTML;
                document.body.innerHTML = `<div style="font-family:sans-serif;padding:16px;">${content}</div>`;
                window.print();
                document.body.innerHTML = original;
                location.reload();
                return;
            }
            // Clean up blob URL after a short delay
            setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
        }

        function generateMobileReport() {
            const assignments = window.currentAssignments;
            const allItems = Object.values(assignments).flat();
            const sameDayItems = allItems.filter(i => i.isSameDay);
            const rightFormItems = allItems.filter(i => i.hasRightForms);

            let html = `<div style="padding:10px;"><h2>Route Report</h2>`;

            if (sameDayItems.length > 0) {
                html += `<div style="background:#fdeaea;border:1px solid #e24b4a;border-radius:4px;padding:6px 10px;margin-bottom:8px;font-size:12px;">
                    <strong>🚨 SAME DAY:</strong> ${sameDayItems.map(i => i.code).join(', ')}
                </div>`;
            }
            if (rightFormItems.length > 0) {
                html += `<div style="background:#eaf3de;border:1px solid #639922;border-radius:4px;padding:6px 10px;margin-bottom:8px;font-size:12px;">
                    <strong>📋 Right Forms:</strong> ${rightFormItems.map(i => i.code).join(', ')}
                </div>`;
            }

            const techNames = Object.keys(assignments).sort().filter(t => assignments[t].length > 0);
            const techsSameDay = techNames.filter(t => assignments[t].some(i => i.isSameDay));
            const techsTomorrow = techNames.filter(t => !assignments[t].some(i => i.isSameDay));

            function renderMobileTech(tech) {
                let block = `<div class="tech-card" style="border:1px solid #ccc; margin-bottom:10px;">
                    <div style="font-weight:bold; font-size:18px; margin-bottom:5px;">${tech}</div>`;
                assignments[tech].forEach((item, i) => {
                    const loc = LOCATIONS[item.code];
                    const todayBadge = item.isSameDay ? ' <span style="color:#c0392b;font-weight:bold;">(TODAY)</span>' : '';
                    const urgentBadge = item.urgent ? ' <span style="color:red;">(SAME DAY)</span>' : '';
                    const rfBadge = item.hasRightForms ? ' <span style="color:#2d6a2d;font-weight:bold;">(Right Forms)</span>' : '';
                    const dateStr = item.restockBy ? ` <span style="color:#888;font-size:11px;">by ${item.restockBy}</span>` : '';

                    let consumDetail = '';
                    if (!item.urgent) {
                        const fc = (window.parsedFormCounts || {})[item.code];
                        if (fc) {
                            if (fc.consumables) {
                                const rfFlag = fc.hasRightForms ? ' <span style="color:#c0392b;font-weight:bold;">⚠️ RIGHT FORMS</span>' : '';
                                consumDetail += `<div style="font-size:12px;color:#333;margin-top:2px;">Items: ${fc.consumables}${rfFlag}</div>`;
                            }
                            const RESTOCK_COUNT = isSurfboard(item.code) ? 700 : 800;
                            const listed = (fc.consumables || '').toLowerCase();
                            const ribbonRequested = listed.includes('ribbon');
                            const leftFormsReq = listed.includes('left forms');
                            const journalRequested = listed.includes('journal');
                            const journalLow = fc.Journal !== null && fc.Journal !== undefined && fc.Journal < JOURNAL_LOW_THRESHOLD;
                            const parts = [];
                            if (isBigHoku(item.code)) {
                                if (fc.formsCount > 0) parts.push(`RF×${fc.formsCount}`);
                                if (fc.ribbonCount > 0) parts.push(`RIB×${fc.ribbonCount}`);
                                if (fc.Journal !== null && fc.Journal !== undefined) parts.push(`J: ${fc.Journal}`);
                            } else {
                            const showLR = !ribbonRequested && typeof fc.LR === 'number' && (
                                (typeof fc.LF === 'number' && fc.LR < fc.LF) ||
                                (leftFormsReq && fc.LR < RESTOCK_COUNT)
                            );
                            if (fc.LF !== undefined && fc.LF !== null) parts.push(`LF: ${fc.LF}`);
                            if (showLR) parts.push(`LR: ${fc.LR} ⚠️`);
                            if (fc.RF !== undefined && fc.RF !== null && fc.RF > 0) {
                                const rfNoteMobile = isGARightFormsEligible(item.code) && fc.RF <= 200 ? ' ⚠️ Swap RF forms with larger partial' : '';
                                parts.push(`RF: ${fc.RF}${rfNoteMobile}`);
                            }
                            if (isSurfboard(item.code)) {
                                if (ribbonRequested && fc.LR !== null && fc.LR !== undefined) parts.push(`LR: ${fc.LR}`);
                                if (fc.Journal !== null && fc.Journal !== undefined) {
                                    const jSBm = fc.Journal < 850 ? `J: ${fc.Journal} — critically low` : fc.Journal < JOURNAL_LOW_THRESHOLD ? `J: ${fc.Journal} — low` : `J: ${fc.Journal}`;
                                    parts.push(jSBm);
                                }
                            } else if ((journalRequested || journalLow) && fc.Journal !== null && fc.Journal !== undefined) {
                                const jLabel = fc.Journal < 850 ? `J: ${fc.Journal} — Journal Paper critically low or out` :
                                               fc.Journal < JOURNAL_LOW_THRESHOLD ? `J: ${fc.Journal} — Journal Paper low` : `J: ${fc.Journal}`;
                                parts.push(jLabel);
                            }
                            }
                            if (parts.length > 0) consumDetail += `<div style="font-size:12px;color:#444;margin-top:1px;">Counts: ${parts.join(' | ')}</div>`;
                            const warnings = checkConsumables(item.code);
                            warnings.forEach(w => { consumDetail += `<div style="font-size:11px;color:#a32d2d;margin-top:2px;">${w}</div>`; });
                        }
                    }

                    const mobileReassignNote = item.reassignedFrom ? `<div style="color:#f0a500;font-size:13px;font-weight:bold;margin-top:2px;">↔ covering for ${item.reassignedFrom.split(' ')[0]}</div>` : '';
                    const metaLine = [urgentBadge, todayBadge, rfBadge, dateStr].filter(Boolean).join(' ');
                    block += `<div style="padding:8px 0;border-bottom:1px solid #eee;">
                        <div style="font-weight:bold;font-size:14px;">${i+1}. ${item.code} — ${(loc || {}).name || item.code}</div>
                        ${metaLine ? `<div style="font-size:12px;color:#555;margin-top:2px;">${metaLine}</div>` : ''}
                        ${mobileReassignNote}
                        ${consumDetail}
                    </div>`;
                });
                block += `</div>`;
                return block;
            }

            if (sameDayItems.length > 0 && techsTomorrow.length > 0) {
                html += `<div style="font-size:11px;font-weight:bold;color:#a32d2d;text-transform:uppercase;margin:8px 0 4px;">Today — Action Required</div>`;
                techsSameDay.forEach(t => { html += renderMobileTech(t); });
                html += `<div style="font-size:11px;font-weight:bold;color:#185fa5;text-transform:uppercase;margin:12px 0 4px;">Tomorrow</div>`;
                techsTomorrow.forEach(t => { html += renderMobileTech(t); });
            } else {
                techNames.forEach(t => { html += renderMobileTech(t); });
            }

            html += `</div>`;
            document.getElementById('mobileReportContent').innerHTML = html;
            document.getElementById('printableReport').innerHTML = html;
            document.getElementById('mobileReportOverlay').classList.add('active');
        }

        // --- SITE HISTORY MODAL ---
        function closeSiteHistory() {
            document.getElementById('siteHistoryOverlay').style.display = 'none';
        }

        async function showSiteHistory(code) {
            const overlay = document.getElementById('siteHistoryOverlay');
            const title = document.getElementById('siteHistoryTitle');
            const body = document.getElementById('siteHistoryBody');
            title.textContent = 'Visit History — ' + code;
            body.innerHTML = 'Loading…';
            overlay.style.display = 'block';
            try {
                const res = await fetch('/.netlify/functions/get-site-history?code=' + encodeURIComponent(code));
                const data = await res.json();
                if (!res.ok || !data.ok) throw new Error(data.error || ('HTTP ' + res.status));
                title.textContent = 'Visit History — ' + data.site.name + ' (' + data.site.code + ')';
                if (!data.visits.length) {
                    body.innerHTML = '<em>No visit history found for this site yet.</em>';
                    return;
                }
                body.innerHTML = data.visits.map(v => {
                    const date = v.started_at ? new Date(v.started_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'Unknown date';
                    const dur = v.duration_min != null ? Math.round(v.duration_min) + ' min' : '';
                    const kindColor = v.is_restock ? '#2e7d32' : '#c62828';
                    const kindLabel = v.is_restock ? 'Restock' : (v.remediation || 'Service');
                    const reviewNote = v.needs_review ? ' <span style="color:#999;font-size:11px;">(site match unconfirmed)</span>' : '';
                    return `<div style="padding:8px 0;border-bottom:1px solid #eee;">
                        <div><strong>${date}</strong> — <span style="color:${kindColor};">${kindLabel}</span>${dur ? ' · ' + dur : ''}</div>
                        <div style="color:#555;">${v.tech_name_raw || 'Unknown tech'}${v.remediation_detail ? ' — ' + v.remediation_detail : ''}${reviewNote}</div>
                        ${v.wo_number ? `<div style="color:#999;font-size:11px;">WO ${v.wo_number}</div>` : ''}
                    </div>`;
                }).join('');
            } catch (err) {
                body.innerHTML = '<span style="color:#c62828;">Error loading history: ' + err.message + '</span>';
            }
        }
    </script>
    <!-- Site History Modal -->
    <div id="siteHistoryOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;" onclick="if(event.target===this)closeSiteHistory()">
        <div style="background:#fff;max-width:600px;margin:40px auto;padding:20px;border-radius:8px;max-height:80vh;overflow-y:auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h3 id="siteHistoryTitle" style="margin:0;">Visit History</h3>
                <button onclick="closeSiteHistory()" style="background:none;border:none;font-size:20px;cursor:pointer;">&times;</button>
            </div>
            <div id="siteHistoryBody" style="font-size:13px;color:#333;">Loading…</div>
        </div>
    </div>
</body>
</html>
